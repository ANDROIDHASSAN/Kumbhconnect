# Render Blueprint — BACKEND ONLY (Express API + managed Postgres).
# The React frontend deploys separately on Vercel (see vercel.json), which
# proxies /api/* to this service. The server auto-creates the schema and
# seeds sample data on first boot.
#
# Deploy: push to GitHub → Render → New → Blueprint → pick this repo → Apply.
# After it's live, copy the service URL (https://kumbh-connect.onrender.com)
# into vercel.json's rewrite destination.

databases:
  - name: kumbh-db
    plan: free
    databaseName: kumbh_connect
    user: kumbh

services:
  - type: web
    name: kumbh-connect
    runtime: node
    plan: free
    # API only — no client build here (the SPA is built & served by Vercel).
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kumbh-db
          property: connectionString
      # CORS allow-list — set to your Vercel URL (e.g. https://kumbhconnect.vercel.app).
      # Optional when Vercel proxies /api server-side, but good to set.
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        value: demo@gmail.com
      - key: ADMIN_NAME
        value: Demo Admin
      - key: ADMIN_PASSWORD
        value: kumbh2027 # change in the Render dashboard after first deploy
      # Optional integrations — blank = gracefully stubbed:
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
